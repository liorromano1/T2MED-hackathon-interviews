<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Choose an Interview Schedule</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #f5f6f8;
      color: #1a1a2e;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .container {
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 4px 32px rgba(0, 0, 0, 0.08);
      max-width: 560px;
      width: 100%;
      padding: 52px 48px 44px;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.4px;
      color: #111827;
      margin-bottom: 12px;
    }

    .header p {
      font-size: 0.975rem;
      color: #6b7280;
      line-height: 1.6;
    }

    .divider {
      width: 40px;
      height: 3px;
      background: #4f46e5;
      border-radius: 2px;
      margin: 20px auto 0;
    }

    .schedules {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 28px;
    }

    .schedule-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 22px;
      background: #fafafa;
      border: 1.5px solid #e5e7eb;
      border-radius: 12px;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .schedule-card:hover {
      background: #f0f0ff;
      border-color: #4f46e5;
      box-shadow: 0 2px 12px rgba(79, 70, 229, 0.10);
    }

    .schedule-card:active {
      background: #eae9ff;
    }

    .card-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .schedule-number {
      width: 38px;
      height: 38px;
      background: #ede9fe;
      color: #4f46e5;
      border-radius: 50%;
      font-size: 0.875rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .schedule-card:hover .schedule-number {
      background: #4f46e5;
      color: #ffffff;
      transition: background 0.18s ease, color 0.18s ease;
    }

    .schedule-label {
      font-size: 1rem;
      font-weight: 600;
      color: #111827;
    }

    .arrow {
      color: #9ca3af;
      font-size: 1.1rem;
      transition: transform 0.18s ease, color 0.18s ease;
    }

    .schedule-card:hover .arrow {
      transform: translateX(3px);
      color: #4f46e5;
    }

    .note {
      text-align: center;
      font-size: 0.82rem;
      color: #9ca3af;
      line-height: 1.5;
    }

    @media (max-width: 480px) {
      .container {
        padding: 36px 24px 32px;
      }

      .header h1 {
        font-size: 1.45rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Choose an Interview Schedule</h1>
      <p>Please select one of the available schedules below to book your interview slot.</p>
      <div class="divider"></div>
    </div>

    <div class="schedules">
      <a class="schedule-card" href="https://cal.com/ליאור-רומנו-6fqewh/t2med-interview" target="_blank" rel="noopener noreferrer">
        <div class="card-left">
          <div class="schedule-number">1</div>
          <span class="schedule-label">Schedule 1</span>
        </div>
        <span class="arrow">→</span>
      </a>

      <a class="schedule-card" href="https://cal.com/t2med-2026/t2med-hackathon-interviews2" target="_blank" rel="noopener noreferrer">
        <div class="card-left">
          <div class="schedule-number">2</div>
          <span class="schedule-label">Schedule 2</span>
        </div>
        <span class="arrow">→</span>
      </a>

      <a class="schedule-card" href="https://cal.com/t2med-hackathon-interview-3" target="_blank" rel="noopener noreferrer">
        <div class="card-left">
          <div class="schedule-number">3</div>
          <span class="schedule-label">Schedule 3</span>
        </div>
        <span class="arrow">→</span>
      </a>

      <a class="schedule-card" href="https://cal.com/mahmoud-ikteelat-f5w7ki/15min" target="_blank" rel="noopener noreferrer">
        <div class="card-left">
          <div class="schedule-number">4</div>
          <span class="schedule-label">Schedule 4</span>
        </div>
        <span class="arrow">→</span>
      </a>

      <a class="schedule-card" href="https://cal.com/t2med-2026/t2med-hackathon-interviews5" target="_blank" rel="noopener noreferrer">
        <div class="card-left">
          <div class="schedule-number">5</div>
          <span class="schedule-label">Schedule 5</span>
        </div>
        <span class="arrow">→</span>
      </a>
    </div>

    <p class="note">Each schedule may show different available times.</p>
  </div>
</body>
</html>
